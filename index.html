<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Index</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="panel">
  <div class="header">
      <h1>Files</h1>
      <p>Welcome! This is a file repo made by Panagiotis.
         <a href="https://panagiotissarr.github.io" style="color:#4da6ff;">Click Here</a> to return to the main homepage.
      </p>
  </div>

  <div class="path" id="path">/files/</div>
  <a href="#" id="backBtn" style="display:none;">← Back</a>

  <div class="search">
      <input type="text" id="search" placeholder="Type to search…">
  </div>

  <table id="fileTable">
    <thead>
      <tr>
        <th onclick="sortTable(0)">Name ↓</th>
        <th>Size</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="fileBody"></tbody>
  </table>
</div>

<script>
// Define your files structure
const fileTree = {
  "/files/": [
    {name:"images", path:"images/", type:"folder", size:"-", date:"2025-12-04"}
  ],
  "/files/images/": [
    {name:"logo-mini.png", path:"images/logo-mini.png", type:"file", size:"2 KB", date:"2025-12-04"}
  ]
};

let currentPath = "/files/";

const tbody = document.getElementById('fileBody');
const pathDiv = document.getElementById('path');
const backBtn = document.getElementById('backBtn');

function loadFiles(path){
  tbody.innerHTML = "";
  pathDiv.textContent = path;

  // Show back button if not at root
  backBtn.style.display = path !== "/files/" ? "inline-block" : "none";

  const files = fileTree[path] || [];
  files.forEach(item => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="icon">${item.type==="folder"?"📁":"📄"}</span>
          <a href="#" class="name-link">${item.name}</a></td>
      <td>${item.size}</td>
      <td>${item.date}</td>
    `;
    // Click folder to navigate inside
    if(item.type==="folder"){
      tr.querySelector("a").addEventListener("click", e => {
        e.preventDefault();
        currentPath = path + item.name + "/";
        loadFiles(currentPath);
      });
    }
    tbody.appendChild(tr);
  });
}

// Back button functionality
backBtn.addEventListener("click", e => {
  e.preventDefault();
  if(currentPath !== "/files/"){
    currentPath = "/files/";
    loadFiles(currentPath);
  }
});

// Initial load
loadFiles(currentPath);

// Search functionality
document.getElementById("search").addEventListener("input", function(){
  const term = this.value.toLowerCase();
  Array.from(tbody.querySelectorAll("tr")).forEach(r => {
    r.style.display = r.innerText.toLowerCase().includes(term) ? "" : "none";
  });
});

// Sorting
window.sortTable = function(colIndex){
  const rows = Array.from(tbody.querySelectorAll("tr"));
  const ascending = tbody.getAttribute("data-sort") !== "asc";
  rows.sort((a,b)=>{
    let A=a.cells[colIndex].innerText.toLowerCase();
    let B=b.cells[colIndex].innerText.toLowerCase();
    return ascending?A.localeCompare(B):B.localeCompare(A);
  });
  tbody.setAttribute("data-sort", ascending?"asc":"desc");
  rows.forEach(r=>tbody.appendChild(r));
}
</script>
</body>
</html>
