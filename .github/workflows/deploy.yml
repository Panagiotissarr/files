# Deploy static + Jekyll-powered site to GitHub Pages
name: Build & Deploy (Jekyll + HTML)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install Jekyll (system-wide)
      - name: Install Jekyll
        run: |
          sudo gem install jekyll bundler

      # Build the site (no Gemfile needed)
      - name: Build Jekyll Site
        run: |
          jekyll build --destination _site

      # Upload the built site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
