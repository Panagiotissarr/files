# Deploy static + Jekyll-powered site to GitHub Pages
name: Build & Deploy (Jekyll + HTML)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Ruby (needed for Jekyll)
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      # Install Jekyll + dependencies if a Gemfile exists
      - name: Install Dependencies
        run: |
          if [ -f "Gemfile" ]; then
            bundle install
          else
            gem install jekyll bundler
          fi

      # Build the Jekyll site (your HTML is kept)
      - name: Build Jekyll Site
        run: |
          bundle exec jekyll build -d _site

      # Upload the built site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
